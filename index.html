<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>収支記録</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Oswald:wght@400;600&display=swap');

  :root {
    --bg: #0e0e12;
    --surface: #18181f;
    --surface2: #22222c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #e8b84b;
    --accent2: #c9992a;
    --win: #3ecf8e;
    --lose: #f06a6a;
    --text: #f0f0f0;
    --text2: #909098;
    --text3: #55555f;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── App Shell ── */
  #app { max-width: 480px; margin: 0 auto; padding-bottom: 72px; }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .app-title {
    font-family: 'Oswald', sans-serif;
    font-size: 20px; letter-spacing: 2px;
    color: var(--accent);
  }
  .month-nav { display: flex; align-items: center; gap: 10px; }
  .month-nav button {
    background: var(--surface2); border: none; color: var(--text);
    width: 32px; height: 32px; border-radius: 8px;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .month-nav button:active { background: var(--border2); }
  .month-label { font-size: 15px; font-weight: 700; min-width: 70px; text-align: center; }

  /* ── Monthly Summary ── */
  .summary {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; padding: 12px 16px;
  }
  .summary-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .summary-card .label { font-size: 10px; color: var(--text2); margin-bottom: 4px; letter-spacing: 0.5px; }
  .summary-card .value { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 600; }
  .summary-card .value.win { color: var(--win); }
  .summary-card .value.lose { color: var(--lose); }
  .summary-card .value.neutral { color: var(--text); }

  /* ── Calendar ── */
  .calendar { padding: 0 12px; }
  .cal-header {
    display: grid; grid-template-columns: repeat(7,1fr);
    text-align: center; margin-bottom: 6px;
  }
  .cal-header span {
    font-size: 11px; color: var(--text3); padding: 4px 0;
    font-weight: 500;
  }
  .cal-header span:first-child { color: #f06a6a88; }
  .cal-header span:last-child  { color: #6ab4f088; }

  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-day {
    aspect-ratio: 1;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: transform .1s, border-color .15s;
    padding: 2px;
    position: relative; overflow: hidden;
  }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.today { border-color: var(--accent) !important; }
  .cal-day:not(.empty):active { transform: scale(0.93); }
  .cal-day .day-num {
    font-size: 12px; font-weight: 500; color: var(--text2);
    line-height: 1;
  }
  .cal-day.sun .day-num { color: #f06a6a88; }
  .cal-day.sat .day-num { color: #6ab4f088; }
  .cal-day.has-data .day-num { color: var(--text); }
  .cal-day .day-val {
    font-family: 'Oswald', sans-serif;
    font-size: 10px; font-weight: 600;
    margin-top: 1px; line-height: 1;
  }
  .cal-day .day-val.win { color: var(--win); }
  .cal-day .day-val.lose { color: var(--lose); }
  .cal-day.win-bg { background: rgba(62,207,142,0.08); border-color: rgba(62,207,142,0.2); }
  .cal-day.lose-bg { background: rgba(240,106,106,0.08); border-color: rgba(240,106,106,0.2); }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 200;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px 0 14px;
    border: none; background: transparent; color: var(--text3);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px; gap: 3px; cursor: pointer; transition: color .15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn .icon { font-size: 20px; }

  /* ── Add Button ── */
  .fab {
    position: fixed; bottom: 80px; right: 50%;
    transform: translateX(calc(50% + 130px));
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); border: none;
    color: #000; font-size: 26px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(232,184,75,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 150; transition: transform .15s, box-shadow .15s;
  }
  .fab:active { transform: translateX(calc(50% + 130px)) scale(0.9); }

  /* ── Sheet (modal bottom) ── */
  .overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0);
    pointer-events: none; transition: background .25s;
  }
  .overlay.open { background: rgba(0,0,0,0.65); pointer-events: all; }
  .sheet {
    position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface); border-radius: 20px 20px 0 0;
    z-index: 400; transition: bottom .3s cubic-bezier(.32,1,.32,1);
    padding: 0 16px 32px; max-height: 90vh; overflow-y: auto;
  }
  .sheet.open { bottom: 0; }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border2); margin: 12px auto 16px;
  }
  .sheet-title {
    font-size: 16px; font-weight: 700; margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sheet-close {
    background: var(--surface2); border: none; color: var(--text2);
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
  }

  /* ── Form ── */
  .form-row { margin-bottom: 14px; }
  .form-row label {
    display: block; font-size: 11px; color: var(--text2);
    margin-bottom: 5px; letter-spacing: 0.3px;
  }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); border-radius: 10px;
    padding: 11px 14px; font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none; transition: border-color .15s;
    -webkit-appearance: none;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
  .form-row select option { background: #22222c; }
  .form-row.two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row.two label { font-size: 11px; }

  .btn-primary {
    width: 100%; padding: 14px; border-radius: 12px;
    background: var(--accent); border: none; color: #000;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: opacity .15s;
  }
  .btn-primary:active { opacity: 0.8; }

  /* ── Detail Sheet (day records) ── */
  .record-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .record-card {
    background: var(--surface2); border-radius: var(--radius);
    padding: 12px 14px; border: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .record-card .rc-left { flex: 1; }
  .record-card .rc-shop { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .record-card .rc-machine { font-size: 12px; color: var(--text2); }
  .record-card .rc-memo { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .record-card .rc-right { text-align: right; }
  .record-card .rc-amount {
    font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 600;
  }
  .record-card .rc-amount.win { color: var(--win); }
  .record-card .rc-amount.lose { color: var(--lose); }
  .record-card .rc-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .record-card .rc-del {
    background: none; border: none; color: var(--text3);
    font-size: 16px; cursor: pointer; margin-left: 10px;
    padding: 4px; border-radius: 6px; transition: color .15s;
  }
  .record-card .rc-del:hover { color: var(--lose); }

  .empty-state {
    text-align: center; padding: 32px 0;
    color: var(--text3); font-size: 13px;
  }
  .empty-state .emo { font-size: 36px; margin-bottom: 8px; }

  /* ── Analysis page ── */
  .page { display: none; padding: 12px 16px; }
  .page.active { display: block; }
  #page-home { display: block; padding-bottom: 8px; }

  .section-title {
    font-size: 12px; color: var(--text2); letter-spacing: 1px;
    text-transform: uppercase; margin: 16px 0 10px;
    font-weight: 500;
  }

  /* ── Bar Chart ── */
  .chart-wrap {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 16px;
    overflow-x: auto;
  }
  .chart-bars { display: flex; gap: 6px; align-items: flex-end; min-height: 120px; }
  .chart-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .chart-bar-inner { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100px; }
  .bar-fill { width: 100%; border-radius: 4px 4px 0 0; min-height: 2px; }
  .bar-fill.win { background: var(--win); }
  .bar-fill.lose { background: var(--lose); }
  .bar-label { font-size: 9px; color: var(--text3); }
  .bar-val { font-size: 9px; font-family: 'Oswald', sans-serif; color: var(--text2); }

  /* ── Machine ranking ── */
  .rank-list { display: flex; flex-direction: column; gap: 8px; }
  .rank-item {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .rank-num { font-family: 'Oswald', sans-serif; font-size: 22px; color: var(--text3); width: 24px; }
  .rank-info { flex: 1; }
  .rank-name { font-size: 13px; font-weight: 700; }
  .rank-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .rank-val { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 600; }
  .rank-val.win { color: var(--win); }
  .rank-val.lose { color: var(--lose); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); color: var(--text);
    padding: 10px 20px; border-radius: 24px; font-size: 13px;
    opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
    border: 1px solid var(--border2); white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">収支記録</div>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="summary-card">
      <div class="label">投資</div>
      <div class="value neutral" id="sumInvest">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">回収</div>
      <div class="value neutral" id="sumReturn">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">収支</div>
      <div class="value neutral" id="sumBalance">¥0</div>
    </div>
  </div>

  <!-- Pages -->
  <div id="page-home">
    <!-- Calendar -->
    <div class="calendar">
      <div class="cal-header">
        <span>日</span><span>月</span><span>火</span><span>水</span>
        <span>木</span><span>金</span><span>土</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <div class="page" id="page-analysis">
    <div class="section-title">月別収支グラフ（直近6ヶ月）</div>
    <div class="chart-wrap"><div class="chart-bars" id="chartBars"></div></div>
    <div class="section-title">機種別成績</div>
    <div class="rank-list" id="machineRank"></div>
    <div class="section-title">店舗別成績</div>
    <div class="rank-list" id="shopRank"></div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="showPage('home')">
    <span class="icon">📅</span>カレンダー
  </button>
  <button class="nav-btn" id="nav-analysis" onclick="showPage('analysis')">
    <span class="icon">📊</span>分析
  </button>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddSheet()" title="記録追加">＋</button>

<!-- Add Sheet -->
<div class="overlay" id="addOverlay" onclick="closeAddSheet()"></div>
<div class="sheet" id="addSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">
    <span id="sheetTitle">収支を追加</span>
    <button class="sheet-close" onclick="closeAddSheet()">✕</button>
  </div>
  <div class="form-row">
    <label>日付</label>
    <input type="date" id="fDate">
  </div>
  <div class="form-row">
    <label>店舗名</label>
    <input type="text" id="fShop" placeholder="例：〇〇ホール" list="shopList">
    <datalist id="shopList"></datalist>
  </div>
  <div class="form-row">
    <label>機種名</label>
    <input type="text" id="fMachine" placeholder="例：バジリスク絆2" list="machineList">
    <datalist id="machineList"></datalist>
  </div>
  <div class="form-row two">
    <div>
      <label>投資額（円）</label>
      <input type="number" id="fInvest" placeholder="0" min="0" step="500">
    </div>
    <div>
      <label>回収額（円）</label>
      <input type="number" id="fReturn" placeholder="0" min="0" step="500">
    </div>
  </div>
  <div class="form-row">
    <label>メモ（任意）</label>
    <input type="text" id="fMemo" placeholder="例：設定6確定、天井狙い">
  </div>
  <button class="btn-primary" onclick="saveRecord()">保存する</button>
</div>

<!-- Detail Sheet (day) -->
<div class="overlay" id="dayOverlay" onclick="closeDaySheet()"></div>
<div class="sheet" id="daySheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">
    <span id="daySheetTitle"></span>
    <button class="sheet-close" onclick="closeDaySheet()">✕</button>
  </div>
  <div class="record-list" id="dayRecords"></div>
  <button class="btn-primary" onclick="openAddFromDay()">この日に追加</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
let records = JSON.parse(localStorage.getItem('pachisuro_records') || '[]');
let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth() + 1;
let selectedDay = null;
let editId = null;

// ── Helpers ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function save() { localStorage.setItem('pachisuro_records', JSON.stringify(records)); }
function fmt(n) {
  const sign = n >= 0 ? '+' : '';
  return sign + n.toLocaleString('ja-JP') + '円';
}
function fmtAbs(n) { return Math.abs(n).toLocaleString('ja-JP'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Navigation ──
function showPage(p) {
  document.getElementById('page-home').style.display = p === 'home' ? '' : 'none';
  document.getElementById('page-analysis').className = 'page' + (p === 'analysis' ? ' active' : '');
  ['home','analysis'].forEach(id => {
    document.getElementById('nav-'+id).className = 'nav-btn' + (id === p ? ' active' : '');
  });
  if (p === 'analysis') renderAnalysis();
}

// ── Month ──
function changeMonth(d) {
  curMonth += d;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  if (curMonth < 1)  { curMonth = 12; curYear--; }
  render();
}

// ── Main Render ──
function render() {
  document.getElementById('monthLabel').textContent = `${curYear}年${curMonth}月`;

  const monthRecs = records.filter(r => {
    const d = new Date(r.date);
    return d.getFullYear() === curYear && d.getMonth()+1 === curMonth;
  });

  const totalInvest = monthRecs.reduce((s,r) => s + r.invest, 0);
  const totalReturn = monthRecs.reduce((s,r) => s + r.ret, 0);
  const balance = totalReturn - totalInvest;

  document.getElementById('sumInvest').textContent = '¥' + totalInvest.toLocaleString();
  document.getElementById('sumReturn').textContent = '¥' + totalReturn.toLocaleString();
  const balEl = document.getElementById('sumBalance');
  balEl.textContent = (balance >= 0 ? '+' : '') + balance.toLocaleString() + '円';
  balEl.className = 'value ' + (balance > 0 ? 'win' : balance < 0 ? 'lose' : 'neutral');

  renderCalendar(monthRecs);
  updateDatalist();
}

function renderCalendar(monthRecs) {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const today = new Date();
  const first = new Date(curYear, curMonth-1, 1);
  const lastDay = new Date(curYear, curMonth, 0).getDate();
  const startDow = first.getDay();

  // Group by day
  const byDay = {};
  monthRecs.forEach(r => {
    const d = new Date(r.date).getDate();
    if (!byDay[d]) byDay[d] = { invest:0, ret:0 };
    byDay[d].invest += r.invest;
    byDay[d].ret += r.ret;
  });

  // Empty cells
  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty'; grid.appendChild(el);
  }

  for (let d = 1; d <= lastDay; d++) {
    const dow = (startDow + d - 1) % 7;
    const el = document.createElement('div');
    const isToday = today.getFullYear()===curYear && today.getMonth()+1===curMonth && today.getDate()===d;
    const dayData = byDay[d];
    const balance = dayData ? dayData.ret - dayData.invest : null;

    let cls = 'cal-day';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (isToday) cls += ' today';
    if (dayData) {
      cls += ' has-data';
      if (balance > 0) cls += ' win-bg';
      else if (balance < 0) cls += ' lose-bg';
    }
    el.className = cls;

    el.innerHTML = `<div class="day-num">${d}</div>`;
    if (dayData && balance !== null) {
      const valCls = balance >= 0 ? 'win' : 'lose';
      const sign = balance >= 0 ? '+' : '';
      el.innerHTML += `<div class="day-val ${valCls}">${sign}${(Math.abs(balance)/1000).toFixed(0)}K</div>`;
    }
    el.onclick = () => openDaySheet(d);
    grid.appendChild(el);
  }
}

// ── Add Sheet ──
function openAddSheet(date) {
  editId = null;
  document.getElementById('sheetTitle').textContent = '収支を追加';
  document.getElementById('fDate').value = date || todayStr();
  document.getElementById('fShop').value = '';
  document.getElementById('fMachine').value = '';
  document.getElementById('fInvest').value = '';
  document.getElementById('fReturn').value = '';
  document.getElementById('fMemo').value = '';
  document.getElementById('addOverlay').classList.add('open');
  document.getElementById('addSheet').classList.add('open');
}
function closeAddSheet() {
  document.getElementById('addOverlay').classList.remove('open');
  document.getElementById('addSheet').classList.remove('open');
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function saveRecord() {
  const date = document.getElementById('fDate').value;
  const shop = document.getElementById('fShop').value.trim();
  const machine = document.getElementById('fMachine').value.trim();
  const invest = parseInt(document.getElementById('fInvest').value) || 0;
  const ret = parseInt(document.getElementById('fReturn').value) || 0;
  const memo = document.getElementById('fMemo').value.trim();

  if (!date) { showToast('日付を入力してください'); return; }
  if (!shop) { showToast('店舗名を入力してください'); return; }
  if (!machine) { showToast('機種名を入力してください'); return; }

  if (editId) {
    const idx = records.findIndex(r => r.id === editId);
    if (idx >= 0) records[idx] = { ...records[idx], date, shop, machine, invest, ret, memo };
  } else {
    records.push({ id: uid(), date, shop, machine, invest, ret, memo, createdAt: new Date().toISOString() });
  }
  save(); render();
  closeAddSheet();
  showToast(editId ? '更新しました ✓' : '追加しました ✓');
  editId = null;
}

// ── Day Sheet ──
function openDaySheet(day) {
  selectedDay = day;
  const dStr = `${curYear}年${curMonth}月${day}日`;
  document.getElementById('daySheetTitle').textContent = dStr;

  const dayRecs = records.filter(r => {
    const d = new Date(r.date);
    return d.getFullYear()===curYear && d.getMonth()+1===curMonth && d.getDate()===day;
  }).sort((a,b) => a.createdAt > b.createdAt ? -1 : 1);

  const list = document.getElementById('dayRecords');
  if (dayRecs.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emo">🎰</div>記録がありません</div>`;
  } else {
    list.innerHTML = dayRecs.map(r => {
      const bal = r.ret - r.invest;
      const cls = bal >= 0 ? 'win' : 'lose';
      const sign = bal >= 0 ? '+' : '';
      return `
        <div class="record-card">
          <div class="rc-left">
            <div class="rc-shop">${r.shop}</div>
            <div class="rc-machine">${r.machine}</div>
            ${r.memo ? `<div class="rc-memo">${r.memo}</div>` : ''}
          </div>
          <div class="rc-right">
            <div class="rc-amount ${cls}">${sign}${bal.toLocaleString()}</div>
            <div class="rc-sub">投資 ${r.invest.toLocaleString()} / 回収 ${r.ret.toLocaleString()}</div>
          </div>
          <button class="rc-del" onclick="deleteRecord('${r.id}')">🗑</button>
        </div>`;
    }).join('');
  }

  document.getElementById('dayOverlay').classList.add('open');
  document.getElementById('daySheet').classList.add('open');
}

function closeDaySheet() {
  document.getElementById('dayOverlay').classList.remove('open');
  document.getElementById('daySheet').classList.remove('open');
}

function openAddFromDay() {
  closeDaySheet();
  const dateStr = `${curYear}-${String(curMonth).padStart(2,'0')}-${String(selectedDay).padStart(2,'0')}`;
  setTimeout(() => openAddSheet(dateStr), 100);
}

function deleteRecord(id) {
  if (!confirm('この記録を削除しますか？')) return;
  records = records.filter(r => r.id !== id);
  save(); render();
  closeDaySheet();
  showToast('削除しました');
}

// ── Datalist ──
function updateDatalist() {
  const shops = [...new Set(records.map(r => r.shop).filter(Boolean))];
  const machines = [...new Set(records.map(r => r.machine).filter(Boolean))];
  document.getElementById('shopList').innerHTML = shops.map(s => `<option value="${s}">`).join('');
  document.getElementById('machineList').innerHTML = machines.map(m => `<option value="${m}">`).join('');
}

// ── Analysis ──
function renderAnalysis() {
  // 直近6ヶ月
  const months = [];
  for (let i = 5; i >= 0; i--) {
    let y = curYear, m = curMonth - i;
    while (m <= 0) { m += 12; y--; }
    months.push({ y, m });
  }

  const monthData = months.map(({y,m}) => {
    const recs = records.filter(r => {
      const d = new Date(r.date);
      return d.getFullYear()===y && d.getMonth()+1===m;
    });
    const invest = recs.reduce((s,r) => s+r.invest, 0);
    const ret = recs.reduce((s,r) => s+r.ret, 0);
    return { label: `${m}月`, balance: ret - invest };
  });

  const maxAbs = Math.max(...monthData.map(d => Math.abs(d.balance)), 1000);
  const bars = document.getElementById('chartBars');
  bars.innerHTML = monthData.map(d => {
    const h = Math.round((Math.abs(d.balance) / maxAbs) * 100);
    const cls = d.balance >= 0 ? 'win' : 'lose';
    const val = d.balance !== 0 ? (d.balance/1000).toFixed(0)+'K' : '0';
    return `
      <div class="chart-bar-wrap">
        <div class="bar-val">${val}</div>
        <div class="chart-bar-inner">
          <div class="bar-fill ${cls}" style="height:${h}px"></div>
        </div>
        <div class="bar-label">${d.label}</div>
      </div>`;
  }).join('');

  // Machine ranking
  const machineMap = {};
  records.forEach(r => {
    if (!machineMap[r.machine]) machineMap[r.machine] = { invest:0, ret:0, count:0 };
    machineMap[r.machine].invest += r.invest;
    machineMap[r.machine].ret += r.ret;
    machineMap[r.machine].count++;
  });
  const machineRank = Object.entries(machineMap)
    .map(([name,d]) => ({ name, balance: d.ret - d.invest, count: d.count }))
    .sort((a,b) => b.balance - a.balance);

  const mEl = document.getElementById('machineRank');
  if (machineRank.length === 0) {
    mEl.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:12px">データがありません</div>';
  } else {
    mEl.innerHTML = machineRank.slice(0,5).map((m,i) => {
      const cls = m.balance >= 0 ? 'win' : 'lose';
      const sign = m.balance >= 0 ? '+' : '';
      return `
        <div class="rank-item">
          <div class="rank-num">${i+1}</div>
          <div class="rank-info">
            <div class="rank-name">${m.name}</div>
            <div class="rank-sub">${m.count}回</div>
          </div>
          <div class="rank-val ${cls}">${sign}${m.balance.toLocaleString()}</div>
        </div>`;
    }).join('');
  }

  // Shop ranking
  const shopMap = {};
  records.forEach(r => {
    if (!shopMap[r.shop]) shopMap[r.shop] = { invest:0, ret:0, count:0 };
    shopMap[r.shop].invest += r.invest;
    shopMap[r.shop].ret += r.ret;
    shopMap[r.shop].count++;
  });
  const shopRank = Object.entries(shopMap)
    .map(([name,d]) => ({ name, balance: d.ret - d.invest, count: d.count }))
    .sort((a,b) => b.balance - a.balance);

  const sEl = document.getElementById('shopRank');
  if (shopRank.length === 0) {
    sEl.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:12px">データがありません</div>';
  } else {
    sEl.innerHTML = shopRank.slice(0,5).map((s,i) => {
      const cls = s.balance >= 0 ? 'win' : 'lose';
      const sign = s.balance >= 0 ? '+' : '';
      return `
        <div class="rank-item">
          <div class="rank-num">${i+1}</div>
          <div class="rank-info">
            <div class="rank-name">${s.name}</div>
            <div class="rank-sub">${s.count}回</div>
          </div>
          <div class="rank-val ${cls}">${sign}${s.balance.toLocaleString()}</div>
        </div>`;
    }).join('');
  }
}

// ── Init ──
render();
</script>
</body>
</html>
